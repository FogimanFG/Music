<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Моя музыка SPA</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
/* ===== Общие стили ===== */
body{
margin:0; padding:0;
font-family:"Inter", Arial, sans-serif;
background:#0b0b0b;
color:#eeeeee;
background-size:cover;
background-repeat:no-repeat;
background-position:center;
transition: background 0.3s, color 0.3s, font-size 0.3s;
}
h1{margin:0;padding:12px 24px;font-size:24px;display:inline-block;}
button{cursor:pointer;transition:0.2s;}

/* ===== Навигация ===== */
.navbar{
display:flex; gap:12px; padding:12px 24px; background:#141212; align-items:center;
flex-wrap:wrap; border-bottom:1px solid #222;
}
.navbar button{
padding:8px 18px; border:none; border-radius:8px; background:#222; color:#eee;
font-weight:500;
transition:0.3s;
}
.navbar button:hover{background:#333;}
.navbar button.active{
background:#b60f0f; color:#fff; font-weight:600;
box-shadow:0 0 10px rgba(182,15,15,0.7);
}
#loginBtn{
margin-left:auto;
background:#0073e6; color:#fff;
padding:8px 18px; border-radius:8px;
font-weight:500;
}
#loginBtn:hover{background:#005bb5;}

/* ===== Контейнер и SPA ===== */
.container{
padding:24px;
max-width:1200px;
margin:auto;
transition:0.3s;
}
.tab{display:none; opacity:0; transition:opacity 0.3s;}
.tab.active{display:block; opacity:1;}

/* ===== Элементы управления ===== */
input[type=range]{width:100%; cursor:pointer;}
.settings-group{margin:10px 0;}
.info-block{padding:12px;background:#171717;border-radius:10px;margin:12px 0;}
.small{font-size:13px;color:rgba(255,255,255,0.7);}
.controls-row{display:flex;gap:12px;align-items:center;}

/* ===== Плеер ===== */
#player{
display:flex; flex-direction:column; align-items:center;
max-width:480px; margin:auto; padding:24px;
background:rgba(30,30,30,0.95); border-radius:20px;
box-shadow:0 8px 30px rgba(0,0,0,0.7);
transition:0.3s;
}
#trackCover, #coverPlaceholder{
width:250px; height:250px; border-radius:16px; object-fit:cover;
}
#coverPlaceholder{
display:flex; align-items:center; justify-content:center;
background:#111; color:rgba(255,255,255,0.25); font-size:18px;
}
#playerControls{
display:flex; justify-content:center; gap:20px; margin-bottom:12px;
}
#playerControls button{
border:none; border-radius:50%; font-size:18px;
width:50px; height:50px; background:#222; color:#ff4c4c;
display:flex; align-items:center; justify-content:center;
transition:0.2s;
}
#playPauseBtn{width:60px; height:60px; background:#b60f0f; color:#fff; font-size:22px;}
#prevBtn, #nextBtn{width:50px; height:50px;}
#playerControls button:hover{transform:scale(1.1);}

/* ===== Список песен ===== */
#songList li{
margin:6px 0; list-style:none; padding:8px; border-radius:8px; background:#171717;
display:flex; justify-content:space-between; align-items:center;
transition:0.2s;
}
#songList li:hover{background:#222;}
#songList li a{
color:#eee; text-decoration:none; font-weight:500;
}
#songList li a:hover{text-decoration:underline;}

/* ===== YouTube поиск ===== */
.youtube-item{
display:flex;align-items:center;gap:12px;
background:#171717;padding:10px;border-radius:8px;margin-top:10px;
transition:0.2s;
}
.youtube-item:hover{background:#222;}
.youtube-item img{width:96px;height:54px;border-radius:6px;object-fit:cover;}
.youtube-info{flex:1;}
.youtube-buttons button{
margin-left:6px; border:none; border-radius:6px; padding:4px 8px;
background:#b60f0f; color:#fff; font-size:14px;
transition:0.2s;
}
.youtube-buttons button:hover{background:#ff4c4c;}

/* ===== Адаптив ===== */
@media(max-width:600px){
#trackCover,#coverPlaceholder{width:160px;height:160px;}
.navbar{gap:6px;padding:8px;}
.navbar button{padding:6px 12px;font-size:14px;}
}
</style>
</head>
<body>

<h1 id="logoTitle">Моя музыка</h1>

<!-- ===== Навигация ===== -->
<div class="navbar">
<button class="tabBtn active" data-tab="playerTab">Плеер</button>
<button class="tabBtn" data-tab="searchTab">Поиск</button>
<button class="tabBtn" data-tab="libraryTab">Библиотека</button>
<button class="tabBtn" data-tab="settingsTab">Настройки</button>
<div id="loginBtn"></div>
</div>

<div class="container">

<!-- ===== Плеер ===== -->
<div id="playerTab" class="tab active">
<div id="player">
<div style="position:relative; width:250px; height:250px; margin-bottom:16px;">
<img id="trackCover" alt="cover" style="display:none;">
<div id="coverPlaceholder">Нет обложки</div>
</div>
<div style="text-align:center; margin-bottom:8px;">
<h2 id="displayTitle">—</h2>
<p id="displayArtist" style="color:rgba(255,255,255,0.7);">—</p>
</div>
<div style="width:100%; margin-bottom:12px;">
<input type="range" id="progress" value="0" min="0" max="100">
<div style="display:flex; justify-content:space-between; font-size:12px; color:rgba(255,255,255,0.7);">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>
</div>
<div id="playerControls">
<button id="prevBtn">⏮</button>
<button id="playPauseBtn">▶️</button>
<button id="nextBtn">⏭</button>
</div>
<div style="width:100%; display:flex; align-items:center; gap:8px; margin-bottom:12px;">
<label style="font-size:12px; color:rgba(255,255,255,0.7);">Громкость</label>
<input type="range" id="volumeControl" min="0" max="1" step="0.01" value="1" style="flex:1;">
</div>
<div style="width:100%; text-align:center; font-size:12px; color:rgba(255,255,255,0.7);">
<p>Источник: <span id="displaySource">—</span></p>
<p id="displayDescription" style="margin-top:4px;">—</p>
</div>
<audio id="audio" crossorigin="anonymous"></audio>
</div>
</div>

<!-- ===== Поиск ===== -->
<div id="searchTab" class="tab">
<div style="display:flex;gap:8px;align-items:center">
<input type="text" id="youtubeSearch" placeholder="Введите название песни" style="width:70%;">
<button id="searchBtn">🔍</button>
<div id="searchStatus" class="small"></div>
</div>
<div id="youtubeResults"></div>
</div>

<!-- ===== Библиотека ===== -->
<div id="libraryTab" class="tab">
<button id="openFormBtn">➕ Добавить песню</button>
<form id="songForm" style="display:none;margin-top:12px;">
<input type="text" id="title" placeholder="Название"><br><br>
<input type="text" id="artist" placeholder="Исполнитель"><br><br>
<textarea id="description" placeholder="Описание"></textarea><br><br>
<input type="file" id="file"><br><br>
<input type="file" id="cover"><br><br>
<button type="submit">Сохранить</button>
</form>
<ul id="songList"></ul>
</div>

<!-- ===== Настройки ===== -->
<div id="settingsTab" class="tab">
<div class="settings-group">
<label>Фон (цвет): <input type="color" id="bgColor" value="#0b0b0b"></label>
</div>
<div class="settings-group">
<label>Фон (картинка/гифка): <input type="file" id="bgImage"></label>
</div>
<div class="settings-group">
<label>Текстовый шрифт: <input type="text" id="fontInput" placeholder="Inter, Arial, ..."></label>
</div>
<div class="settings-group">
<label>Размер шрифта: <input type="number" id="fontSizeInput" min="10" max="72" value="16"> px</label>
</div>
<div class="settings-group">
<label>Цвет текста: <input type="color" id="textColor" value="#eeeeee"></label>
</div>
<div class="settings-group">
<label>Логотип (текст): <input type="text" id="logoInput" placeholder="Моя музыка"></label>
</div>
<div class="info-block small">
<strong>Важно про YouTube API:</strong><br>
Ключ в переменной <code>API_KEY</code>.
</div>
</div>

</div>

<!-- ===== Скрытый YouTube Player ===== -->
<div id="ytPlayer" style="display:none;"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_KEY = 'AIzaSyAHNZ_0tza9cZmg4lxN3mkB43x_a9788SM';
const CLIENT_ID = '377987731007-r35otlhn9u06ep6d4f8mvg9jrphi7gkg.apps.googleusercontent.com';

let songs=[], currentIndex=-1, isPlaying=false;
let userLoggedIn=false;
let ytPlayer, ytCurrentSong=null;

/* SPA */
const tabs=document.querySelectorAll('.tab');
const tabBtns=document.querySelectorAll('.tabBtn');
const player=document.getElementById('player');
tabBtns.forEach(btn=>{
btn.addEventListener('click',()=>{
tabBtns.forEach(b=>b.classList.remove('active'));
tabs.forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
document.getElementById(btn.dataset.tab).classList.add('active');
player.style.display=(btn.dataset.tab==='playerTab')?'flex':'none';
});
});

/* Настройки */
const bgColor=document.getElementById('bgColor');
const bgImage=document.getElementById('bgImage');
const fontInput=document.getElementById('fontInput');
const fontSizeInput=document.getElementById('fontSizeInput');
const textColor=document.getElementById('textColor');
const logoInput=document.getElementById('logoInput');
const logoTitle=document.getElementById('logoTitle');

bgColor.addEventListener('input',()=>{if(!bgImage.files[0]) document.body.style.background=bgColor.value;});
bgImage.addEventListener('change',()=>{
const f=bgImage.files[0]; if(!f) return;
const r=new FileReader();
r.onload=e=>{document.body.style.backgroundImage=`url(${e.target.result})`;document.body.style.backgroundColor='transparent';};
r.readAsDataURL(f);
});
fontInput.addEventListener('input',()=>document.body.style.fontFamily=fontInput.value);
fontSizeInput.addEventListener('input',()=>document.body.style.fontSize=fontSizeInput.value+'px');
textColor.addEventListener('input',()=>document.body.style.color=textColor.value);
logoInput.addEventListener('input',()=>logoTitle.textContent=logoInput.value);

/* Плеер */
const audio=document.getElementById('audio');
const playPauseBtn=document.getElementById('playPauseBtn');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const progress=document.getElementById('progress');
const currentTimeEl=document.getElementById('currentTime');
const durationEl=document.getElementById('duration');
const displayTitle=document.getElementById('displayTitle');
const displayArtist=document.getElementById('displayArtist');
const displayDescription=document.getElementById('displayDescription');
const displaySource=document.getElementById('displaySource');
const trackCover=document.getElementById('trackCover');
const coverPlaceholder=document.getElementById('coverPlaceholder');
const volumeControl=document.getElementById('volumeControl');

/* Локальные песни */
const openFormBtn=document.getElementById('openFormBtn');
const songForm=document.getElementById('songForm');
const songList=document.getElementById('songList');

openFormBtn.addEventListener('click',()=>songForm.style.display=(songForm.style.display==='none')?'block':'none');

songForm.addEventListener('submit',function(e){
e.preventDefault();
const title=document.getElementById('title').value.trim();
const artist=document.getElementById('artist').value.trim();
const description=document.getElementById('description').value.trim();
const file=document.getElementById('file').files[0];
const cover=document.getElementById('cover').files[0];
if(!title || !artist || !file) return alert('Заполните все поля!');
const r=new FileReader();
r.onload=e=>{
const song={title, artist, description, fileData:e.target.result, source:'local', cover:null};
if(cover){
const r2=new FileReader();
r2.onload=e2=>{song.cover=e2.target.result; songs.push(song); renderSongs();};
r2.readAsDataURL(cover);
} else {songs.push(song); renderSongs();}
songForm.reset(); songForm.style.display='none';
if(songs.length===1) loadSong(0);
};
r.readAsDataURL(file);
});

function renderSongs(){
songList.innerHTML='';
songs.forEach((s,i)=>{
const li=document.createElement('li');
const a=document.createElement('a');
a.href="#";
a.textContent=`${s.title} — ${s.artist} (${s.source})`;
a.onclick=e=>{e.preventDefault(); loadSong(i); if(s.source==='local') playSong(); else playYouTube(s.fileData);};
li.appendChild(a);
songList.appendChild(li);
});
}

/* Управление плеером */
function loadSong(i){
if(i<0 || i>=songs.length) return;
currentIndex=i;
const s=songs[i];
displayTitle.textContent=s.title;
displayArtist.textContent=s.artist;
displayDescription.textContent=s.description;
displaySource.textContent=s.source;
if(s.cover){trackCover.src=s.cover; trackCover.style.display='block'; coverPlaceholder.style.display='none';}
else{trackCover.style.display='none'; coverPlaceholder.style.display='flex';}
if(s.source==='local'){audio.src=s.fileData;}
playPauseBtn.textContent='▶️'; isPlaying=false;
}
function playSong(){ if(currentIndex<0)return; audio.play(); playPauseBtn.textContent='⏸'; isPlaying=true; }
playPauseBtn.onclick=()=>{if(currentIndex<0){alert('Выберите песню!'); return;}
if(!isPlaying){ if(songs[currentIndex].source==='local'){playSong();} else {playYouTube(songs[currentIndex].fileData);} }
else{ if(songs[currentIndex].source==='local'){audio.pause();playPauseBtn.textContent='▶️';isPlaying=false;} else {pauseYouTube();} } };
prevBtn.onclick=()=>{if(currentIndex>0) loadSong(currentIndex-1);};
nextBtn.onclick=()=>{if(currentIndex<songs.length-1) loadSong(currentIndex+1);};

audio.ontimeupdate=()=>{if(!isNaN(audio.duration)){progress.value=(audio.currentTime/audio.duration)*100; currentTimeEl.textContent=formatTime(audio.currentTime); durationEl.textContent=formatTime(audio.duration);}};
progress.oninput=()=>{if(!isNaN(audio.duration)) audio.currentTime=(progress.value/100)*audio.duration;};
volumeControl.oninput=()=>{if(currentIndex>=0 && songs[currentIndex].source==='local') audio.volume=volumeControl.value;};

function formatTime(sec){const m=Math.floor(sec/60),s=Math.floor(sec%60);return `${m}:${s<10?'0':''}${s}`;}

/* Google Login */
window.onload = () => {
google.accounts.id.initialize({
client_id: CLIENT_ID,
callback: handleCredentialResponse
});
google.accounts.id.renderButton(document.getElementById('loginBtn'), { theme:'outline', size:'large' });
};
function handleCredentialResponse(response){
userLoggedIn=true;
document.getElementById('loginBtn').style.display='none';
alert('Вы вошли через Google!');
}

/* YouTube IFrame Player */
function onYouTubeIframeAPIReady() {
ytPlayer = new YT.Player('ytPlayer',{
height:'0', width:'0', videoId:'',
events:{'onReady':()=>console.log('YouTube Player готов'),'onStateChange':onPlayerStateChange}
});
}
function onPlayerStateChange(event){
if(event.data===YT.PlayerState.ENDED){if(currentIndex<songs.length-1) loadSong(currentIndex+1);}
}
function playYouTube(videoId){
if(!ytPlayer) return;
ytCurrentSong=videoId;
ytPlayer.loadVideoById(videoId);
playPauseBtn.textContent='⏸';
isPlaying=true;
}
function pauseYouTube(){if(ytPlayer) ytPlayer.pauseVideo(); playPauseBtn.textContent='▶️'; isPlaying=false; }

/* YouTube поиск */
const searchInput=document.getElementById('youtubeSearch');
const searchBtn=document.getElementById('searchBtn');
const results=document.getElementById('youtubeResults');

searchBtn.onclick = async () => {
if(!userLoggedIn){ alert('Сначала войдите через Google!'); return; }
const q = searchInput.value.trim(); if(!q) return;
results.innerHTML='<p>Загрузка...</p>';
const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=8&q=${encodeURIComponent(q)}&key=${API_KEY}`);
const data = await r.json();
results.innerHTML='';
data.items.forEach(v=>{
const div=document.createElement('div');
div.className='youtube-item';
div.innerHTML=`
<img src="${v.snippet.thumbnails.medium.url}">
<div class="youtube-info">
<div><strong>${v.snippet.title}</strong></div>
<div class="small">${v.snippet.channelTitle}</div>
</div>
<div class="youtube-buttons">
<button class="playBtn">▶️ Прослушать</button>
<button class="addBtn">➕ В библиотеку</button>
</div>
`;
const songData={
title:v.snippet.title,
artist:v.snippet.channelTitle,
description:v.snippet.description,
cover:v.snippet.thumbnails.medium.url,
source:'YouTube',
fileData:v.id.videoId
};
div.querySelector('.playBtn').onclick=()=>{songs.push(songData); loadSong(songs.length-1); playYouTube(songData.fileData);};
div.querySelector('.addBtn').onclick=()=>{songs.push(songData); renderSongs(); alert('Добавлено в библиотеку!');};
results.appendChild(div);
});
};
</script>
</body>
</html>
